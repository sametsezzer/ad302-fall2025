<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier Boho</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f5f0;
      font-family: 'Georgia', serif;
      color: #2c2c2c;
    }

    .card {
      max-width: 680px;
      width: 90%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 52px;
      text-align: center;
    }

    .brand {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a0896b;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      margin-bottom: 28px;
      color: #1a1a1a;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #a0896b;
      margin: 0 auto 28px;
    }

    #summary {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #444;
      min-height: 80px;
    }

    #summary.loading {
      color: #aaa;
      font-style: italic;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: #a0896b;
      color: #fff;
    }

    .btn-secondary {
      background: #2c2c2c;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Brand Spotlight</p>
    <h1>Atelier Boho</h1>
    <div class="divider"></div>
    <p id="summary" class="loading">Loading summary…</p>
    <div class="buttons">
      <a class="btn btn-primary" href="https://www.atelierboho.com.tr/" target="_blank" rel="noopener">
        Visit Atelier Boho
      </a>
      <a class="btn btn-secondary" href="https://www.alightapps.com/" target="_blank" rel="noopener">
        Visit Alight Apps
      </a>
    </div>
  </div>

  <script>
    fetch('/api/summary')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('summary');
        el.classList.remove('loading');
        el.textContent = data.summary || 'No summary available.';
      })
      .catch(() => {
        const el = document.getElementById('summary');
        el.classList.remove('loading');
        el.textContent = 'Failed to load summary.';
      });
  </script>
</body>
</html>
